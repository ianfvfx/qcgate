<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QCGate{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0f1117;
            --surface:      #1a1d27;
            --surface2:     #22263a;
            --border:       #2e3248;
            --text:         #e2e4f0;
            --text-muted:   #7b82a0;
            --accent:       #5b6af0;
            --accent-hover: #4a58e0;
            --green:        #2ecc71;
            --amber:        #f0a500;
            --blue:         #3b9fe8;
            --red:          #e85050;
            --radius:       6px;
            --font:         -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono:    "SF Mono", "Fira Code", monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text);
            text-decoration: none;
        }
        .nav-brand span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: var(--text-muted); font-size: 13px; }
        .nav-links a:hover { color: var(--text); text-decoration: none; }
        .nav-user { color: var(--text-muted); font-size: 13px; }

        /* Main layout */
        main { padding: 28px 24px; max-width: 1400px; margin: 0 auto; }

        /* Page header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-title { font-size: 18px; font-weight: 600; }
        .breadcrumb { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .breadcrumb a { color: var(--text-muted); }
        .breadcrumb a:hover { color: var(--text); }

        /* Search */
        .search-bar {
            margin-bottom: 16px;
        }
        .search-bar input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            width: 300px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar input::placeholder { color: var(--text-muted); }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }
        .mono { font-family: var(--font-mono); font-size: 12px; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .badge-awaiting  { background: rgba(240,165,0,0.15);  color: var(--amber); }
        .badge-progress  { background: rgba(59,159,232,0.15); color: var(--blue);  }
        .badge-passed    { background: rgba(46,204,113,0.15); color: var(--green); }
        .badge-failed    { background: rgba(232,80,80,0.15);  color: var(--red);   }
        .badge-conflict  { background: rgba(232,80,80,0.15);  color: var(--red);   }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; text-decoration: none; }
        .btn-primary  { background: var(--accent);  color: #fff; }
        .btn-success  { background: var(--green);   color: #000; }
        .btn-danger   { background: var(--red);     color: #fff; }
        .btn-neutral  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }

        /* Action buttons in table rows */
        .actions { display: flex; gap: 6px; flex-wrap: wrap; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input[type="text"], input[type="password"], textarea, select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            width: 100%;
            outline: none;
            font-family: var(--font);
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 80px; }

        /* Modal overlay */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 440px;
            max-width: 90vw;
        }
        .modal h3 { font-size: 15px; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* Detail panels */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .detail-card h4 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .detail-label { color: var(--text-muted); padding-right: 16px; flex-shrink: 0; }
        .detail-value { font-family: var(--font-mono); font-size: 12px; }

        /* Alerts */
        .alert {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .alert-warning { background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.3); color: var(--amber); }
        .alert-error   { background: rgba(232,80,80,0.12); border: 1px solid rgba(232,80,80,0.3); color: var(--red); }
        .alert-success { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3); color: var(--green); }

        /* Empty state */
        .empty-state { padding: 48px; text-align: center; color: var(--text-muted); }
        .empty-state p { margin-top: 8px; font-size: 13px; }

        /* Stakeholder banner */
        .stakeholder-banner {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 8px 24px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

{% block nav %}
<nav>
    <a class="nav-brand" href="/">QC<span>Gate</span></a>
    <div class="nav-links">
        {% if user %}
            <a href="/">Dashboard</a>
            {% if user.role == 'admin' %}
            <a href="/admin">Admin</a>
            {% endif %}
            <span class="nav-user">{{ user.username }}</span>
            <a href="/logout">Log out</a>
        {% endif %}
    </div>
</nav>
{% endblock %}

{% block body %}
<main>
    {% block content %}{% endblock %}
</main>
{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
