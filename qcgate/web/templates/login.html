<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QCGate — Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2e3248;
            --text: #e2e4f0; --text-muted: #7b82a0; --accent: #5b6af0;
            --red: #e85050; --radius: 6px;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 36px; width: 360px;
        }
        .login-brand {
            font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
            margin-bottom: 24px; text-align: center;
        }
        .login-brand span { color: var(--accent); }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 9px 12px; border-radius: var(--radius);
            font-size: 13px; width: 100%; outline: none;
        }
        input:focus { border-color: var(--accent); }
        .btn-login {
            width: 100%; padding: 10px; background: var(--accent);
            color: #fff; border: none; border-radius: var(--radius);
            font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.88; }
        .error {
            background: rgba(232,80,80,0.12); border: 1px solid rgba(232,80,80,0.3);
            color: var(--red); padding: 9px 12px; border-radius: var(--radius);
            font-size: 13px; margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-brand">QC<span>Gate</span></div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Log in</button>
        </form>
    </div>
</body>
</html>
